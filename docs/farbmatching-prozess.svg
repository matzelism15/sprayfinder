<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1080" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3a3f52"/>
    </marker>
    <style>
      .track-label { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
      .track-sub   { font-size: 11px; fill: #6a7080; }
      .step-num    { font-size: 14px; font-weight: 800; }
      .step-title  { font-size: 14px; font-weight: 700; fill: #0e0f13; }
      .step-desc   { font-size: 11.5px; fill: #2a2e3a; }
      .small       { font-size: 10.5px; fill: #6a7080; }
      .merge-title { font-size: 17px; font-weight: 800; fill: #0e0f13; letter-spacing: -0.01em; }
      .merge-desc  { font-size: 12px; fill: #1a1d24; }
      .out-title   { font-size: 17px; font-weight: 800; fill: #0e0f13; letter-spacing: -0.01em; }
      .out-line    { font-size: 12px; fill: #1a1d24; }
      .arrow       { stroke: #3a3f52; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="800" fill="#0e0f13" letter-spacing="-0.01em">
    Der Farbabgleich im Sprühfarben-Finder
  </text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#6a7080">
    Zwei Stränge laufen in der Matching-Stufe zusammen
  </text>

  <!-- ============ TRACK A (left) - Datenbank ============ -->
  <text x="240" y="98" text-anchor="middle" class="track-label" fill="#a86b1a">A · DATENBANK-KURATIERUNG</text>
  <text x="240" y="116" text-anchor="middle" class="track-sub">(einmalig, vor Veröffentlichung)</text>

  <!-- A1 -->
  <rect x="60" y="140" width="360" height="84" rx="10" fill="#fdf3e3" stroke="#cf8830" stroke-width="1.2"/>
  <text x="78" y="166" class="step-num" fill="#a86b1a">A1</text>
  <text x="108" y="166" class="step-title">Quellen sammeln</text>
  <text x="78" y="188" class="step-desc">Hersteller-Webseiten, RAL-Tabellen, Produkt-</text>
  <text x="78" y="204" class="step-desc">fotos, Color-Picker auf Swatches</text>
  <text x="78" y="220" class="small">Montana · MTN · Molotow · Loop Colors</text>

  <!-- arrow A1 -> A2 -->
  <path d="M240,224 L240,254" class="arrow" marker-end="url(#arr)"/>

  <!-- A2 -->
  <rect x="60" y="258" width="360" height="84" rx="10" fill="#fdf3e3" stroke="#cf8830" stroke-width="1.2"/>
  <text x="78" y="284" class="step-num" fill="#a86b1a">A2</text>
  <text x="108" y="284" class="step-title">Kuratieren &amp; Plausibilität prüfen</text>
  <text x="78" y="306" class="step-desc">Farbname zum Hex passend? Ähnliche Töne</text>
  <text x="78" y="322" class="step-desc">zwischen Herstellern konsistent?</text>
  <text x="78" y="338" class="small">Offensichtliche Fehler korrigieren</text>

  <!-- arrow A2 -> A3 -->
  <path d="M240,342 L240,372" class="arrow" marker-end="url(#arr)"/>

  <!-- A3 -->
  <rect x="60" y="376" width="360" height="84" rx="10" fill="#fdf3e3" stroke="#cf8830" stroke-width="1.2"/>
  <text x="78" y="402" class="step-num" fill="#a86b1a">A3</text>
  <text x="108" y="402" class="step-title">Datenbank mit ~1 250 Dosen</text>
  <text x="78" y="424" class="step-desc">Pro Eintrag: Hersteller, Code, Farbname,</text>
  <text x="78" y="440" class="step-desc">Hex-Wert</text>
  <text x="78" y="456" class="small">{b: "MTN 94", c: "RV-3020", n: "Tomato Red", h: "#E2231A"}</text>

  <!-- arrow A3 -> A4 -->
  <path d="M240,460 L240,490" class="arrow" marker-end="url(#arr)"/>

  <!-- A4 -->
  <rect x="60" y="494" width="360" height="84" rx="10" fill="#fdf3e3" stroke="#cf8830" stroke-width="1.2"/>
  <text x="78" y="520" class="step-num" fill="#a86b1a">A4</text>
  <text x="108" y="520" class="step-title">Vorab in Lab umrechnen</text>
  <text x="78" y="542" class="step-desc">sRGB → linear RGB → XYZ → CIE Lab</text>
  <text x="78" y="558" class="step-desc">Ergebnis: 1 250 Lab-Vektoren bereit zum</text>
  <text x="78" y="574" class="step-desc">Vergleich</text>

  <!-- ============ TRACK B (right) - Bildverarbeitung ============ -->
  <text x="660" y="98" text-anchor="middle" class="track-label" fill="#1f5fa8">B · BILDVERARBEITUNG</text>
  <text x="660" y="116" text-anchor="middle" class="track-sub">(bei jedem Upload neu)</text>

  <!-- B1 -->
  <rect x="480" y="140" width="360" height="84" rx="10" fill="#e8f0fa" stroke="#3a78c9" stroke-width="1.2"/>
  <text x="498" y="166" class="step-num" fill="#1f5fa8">B1</text>
  <text x="528" y="166" class="step-title">Bild-Upload</text>
  <text x="498" y="188" class="step-desc">JPG · PNG · WEBP per Datei-Auswahl oder</text>
  <text x="498" y="204" class="step-desc">Drag &amp; Drop</text>
  <text x="498" y="220" class="small">Bleibt lokal im Browser — kein Server</text>

  <!-- arrow B1 -> B2 -->
  <path d="M660,224 L660,254" class="arrow" marker-end="url(#arr)"/>

  <!-- B2 -->
  <rect x="480" y="258" width="360" height="84" rx="10" fill="#e8f0fa" stroke="#3a78c9" stroke-width="1.2"/>
  <text x="498" y="284" class="step-num" fill="#1f5fa8">B2</text>
  <text x="528" y="284" class="step-title">Auf 160 px verkleinern</text>
  <text x="498" y="306" class="step-desc">Längste Seite = 160 px → etwa 19 000</text>
  <text x="498" y="322" class="step-desc">Farbpunkte</text>
  <text x="498" y="338" class="small">Reicht für Farbstatistik, spart Rechenzeit</text>

  <!-- arrow B2 -> B3 -->
  <path d="M660,342 L660,372" class="arrow" marker-end="url(#arr)"/>

  <!-- B3 -->
  <rect x="480" y="376" width="360" height="84" rx="10" fill="#e8f0fa" stroke="#3a78c9" stroke-width="1.2"/>
  <text x="498" y="402" class="step-num" fill="#1f5fa8">B3</text>
  <text x="528" y="402" class="step-title">Pixel in Lab umrechnen</text>
  <text x="498" y="424" class="step-desc">Gleicher Pfad wie A4: sRGB → linear →</text>
  <text x="498" y="440" class="step-desc">XYZ → CIE Lab</text>
  <text x="498" y="456" class="small">Wahrnehmungstreuer Farbraum</text>

  <!-- arrow B3 -> B4 -->
  <path d="M660,460 L660,490" class="arrow" marker-end="url(#arr)"/>

  <!-- B4 -->
  <rect x="480" y="494" width="360" height="84" rx="10" fill="#e8f0fa" stroke="#3a78c9" stroke-width="1.2"/>
  <text x="498" y="520" class="step-num" fill="#1f5fa8">B4</text>
  <text x="528" y="520" class="step-title">k-means-Clustering</text>
  <text x="498" y="542" class="step-desc">14 Iterationen → K Cluster-Zentren</text>
  <text x="498" y="558" class="step-desc">(K = 2 – 16, vom Nutzer wählbar)</text>
  <text x="498" y="574" class="small">Plus: Anteil jedes Clusters am Bild</text>

  <!-- ============ MERGE arrows ============ -->
  <path d="M240,578 C240,640 360,650 410,668" class="arrow" marker-end="url(#arr)"/>
  <path d="M660,578 C660,640 540,650 490,668" class="arrow" marker-end="url(#arr)"/>

  <!-- ============ MATCHING BOX ============ -->
  <rect x="180" y="678" width="540" height="138" rx="12" fill="#fdecec" stroke="#c9434c" stroke-width="1.5"/>
  <text x="450" y="708" text-anchor="middle" class="merge-title">5 · MATCHING — Brücke zwischen den Strängen</text>
  <text x="450" y="734" text-anchor="middle" class="merge-desc">Für jedes Cluster-Zentrum aus B4 wird die Dose aus A4</text>
  <text x="450" y="752" text-anchor="middle" class="merge-desc">mit der kleinsten Lab-Distanz gewählt:</text>
  <rect x="290" y="766" width="320" height="32" rx="6" fill="#ffffff" stroke="#c9434c" stroke-width="0.8"/>
  <text x="450" y="787" text-anchor="middle" font-family="SF Mono, Menlo, Consolas, monospace" font-size="12" fill="#0e0f13">
    ΔE = √( (L₁ − L₂)² + (a₁ − a₂)² + (b₁ − b₂)² )
  </text>

  <!-- arrow Match -> Output -->
  <path d="M450,820 L450,852" class="arrow" marker-end="url(#arr)"/>

  <!-- ============ OUTPUT BOX ============ -->
  <rect x="180" y="858" width="540" height="190" rx="12" fill="#f1f3f7" stroke="#4b5366" stroke-width="1.5"/>
  <text x="450" y="888" text-anchor="middle" class="out-title">6 · AUSGABE im UI</text>

  <!-- four output items in 2x2 grid -->
  <circle cx="220" cy="918" r="4" fill="#4b5366"/>
  <text x="234" y="922" class="out-line">Vorschau in Dosenfarben (Original ↔ Empfehlung)</text>

  <circle cx="220" cy="946" r="4" fill="#4b5366"/>
  <text x="234" y="950" class="out-line">Empfehlungsliste mit Match-Qualität</text>
  <text x="234" y="966" class="small">Sehr gut · OK · Annäherung (Schwellen bei ΔE 5 und 12)</text>

  <circle cx="220" cy="990" r="4" fill="#4b5366"/>
  <text x="234" y="994" class="out-line">Farbverteilung in Prozent</text>

  <circle cx="220" cy="1018" r="4" fill="#4b5366"/>
  <text x="234" y="1022" class="out-line">Einkaufsliste mit Hersteller, Code und Farbname</text>

  <!-- Footer -->
  <text x="450" y="1068" text-anchor="middle" font-size="10" fill="#9aa1b4">
    Sprühfarben-Finder · matzelism15.github.io/sprayfinder
  </text>
</svg>
